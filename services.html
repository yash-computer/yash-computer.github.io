}

.card{
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* MOBILE */

height:220px;

<div class="menu" onclick="toggleMenu()">☰</div>

<section class="services" data-aos="fade-up">

<h2>Our Services</h2>

<input type="text" id="search" placeholder="Search Service..." onkeyup="searchService()">

<div class="filter">
<button onclick="filterService('all')">All</button>
<button onclick="filterService('Documents')">Documents</button>
<button onclick="filterService('Card')">Card</button>
<button onclick="filterService('Bill')">Bill</button>
<button onclick="filterService('Printing')">Printing</button>
</div>

<div class="grid" id="serviceContainer"></div>

</section>

<script src="js/script.js"></script>

<script>
let allServices = [];

function loadServices(){
let services = JSON.parse(localStorage.getItem("services")) || [];

if(services.length === 0){
services = [
{name:"New or Correction PAN Card",charge:"200",doc:"Aadhaar,Mobile No.,Email",icon:"fa-solid fa-id-card",category:"Card",status:"active",highlight:true},
{name:"Income/Cast/Domicile Certificate",charge:"80",doc:"Aadhaar+OTP",icon:"fa-solid fa-file-lines",category:"Documents",status:"active",highlight:true},
{name:"Paasport Size Photo",charge:"20/3,30/6,50/12",doc:"NA",icon:"fa-solid fa-camera",category:"Printing",status:"active",highlight:true},
{name:"Online Form",charge:"100",doc:"Aadhaar, Related Form Doc",icon:"fa-solid fa-file-pen",category:"Documents",status:"active",highlight:false},
{name:"Online Pension",charge:"100",doc:"Aadhaar,BankPassbook",icon:"fa-solid fa-money-check-dollar",category:"Documents",status:"active",highlight:false},
{name:"Whatsapp Print",charge:"10/1",doc:"NA",icon:"fa-brands fa-whatsapp",category:"Printing",status:"active",highlight:false},
{name:"Typing",charge:"50/page",doc:"NA",icon:"fa-solid fa-keyboard",category:"Documents",status:"active",highlight:true},
{name:"Online Varasat",charge:"100",doc:"Khatuni,Adhar",icon:"fa-solid fa-landmark",category:"Documents",status:"active",highlight:true},
{name:"Bill Pay",charge:"Only Bill",doc:"Bill Receipt",icon:"fa-solid fa-file-invoice-dollar",category:"Bill",status:"active",highlight:false},
];
}

allServices = services;
displayServices(allServices);
}

function displayServices(list){
let html="";

list.forEach((s,index)=>{

let status = s.status || "active";
if(status === "off") return;

html += `
<div class="card ${s.highlight ? 'highlight' : ''}" data-aos="fade-up" data-aos-delay="${index*100}">
<i class="${s.icon}"></i>
<h3>${s.name}</h3>
<p><b>₹${s.charge}</b></p>
<p>${s.doc}</p>
</div>
`;
});

document.getElementById("serviceContainer").innerHTML = html;
}

function searchService(){
let val = document.getElementById("search").value.toLowerCase();
let filtered = allServices.filter(s => (s.name || "").toLowerCase().includes(val));
displayServices(filtered);
}

function filterService(cat){
if(cat === "all"){
displayServices(allServices);
}else{
let filtered = allServices.filter(s => (s.category || "Other") === cat);
displayServices(filtered);
}
}

loadServices();
</script>
